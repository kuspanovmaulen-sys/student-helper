<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1F4E79">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/min.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Студенческий помощник АВПК</title>
</head>

<body>

    <header>
        <h1 id="page-title">Главная</h1>
    </header>

    <main id="app">

        <section id="home" class="screen active">
            <h2 id="welcome-title">Добро пожаловать!</h2>

            <div class="card">
                <h3>Сводка</h3>
                <div id="home-stats" style="margin-top:12px;"></div>
            </div>

            <div class="card">
                <h3>Настройки</h3>
                <label style="display:flex; justify-content:space-between;
                  align-items:center; margin-top:12px;">
                    <span>Тёмная тема</span>
                    <input type="checkbox" id="theme-toggle" style="width:auto; transform:scale(1.5);">
                </label>
            </div>

            <div class="card" style="text-align:center;">
                <button id="reset-btn" class="btn" style="background:#dc2626;">
                    Сбросить все данные
                </button>
            </div>
        </section>


        <section id="tasks" class="screen">
            <h2>Задачи</h2>

            <form id="task-form">
                <input type="text" id="task-input" placeholder="Что нужно сделать?" required>
                <button type="submit" class="btn">Добавить задачу</button>
            </form>
            <div id="task-stats" style="margin:12px 0; color:#666; font-size:0.9rem;">
            </div>

            <div class="filters" style="display:flex; gap:8px; margin-bottom:16px;">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="active">Активные</button>
                <button class="filter-btn" data-filter="done">Выполненные</button>
            </div>

            <div id="task-list"></div>
        </section>

        <section id="notes" class="screen">
            <h2>Заметки</h2>

            <form id="note-form">
                <input type="text" id="note-title" placeholder="Заголовок заметки" required>
                <textarea id="note-content" placeholder="Текст заметки..." rows="4" required></textarea>
                <button type="submit" class="btn">Сохранить заметку</button>
            </form>

            <div id="note-list" style="margin-top:20px;"></div>
        </section>


        <section id="grades" class="screen">
            <h2>Оценки</h2>

            <form id="grade-form">
                <input type="text" id="grade-subject" placeholder="Название предмета" required>
                <select id="grade-value" required>
                    <option value="">Выберите оценку</option>
                    <option value="5">5 — отлично</option>
                    <option value="4">4 — хорошо</option>
                    <option value="3">3 — удовлетворительно</option>
                    <option value="2">2 — неудовлетворительно</option>
                </select>
                <button type="submit" class="btn">Добавить оценку</button>
            </form>

            <div id="grade-summary" style="margin-top:20px;"></div>
            <div id="grade-list" style="margin-top:16px;"></div>
        </section>


        <section id="schedule" class="screen">
            <h2>Расписание</h2>

            <div id="day-tabs" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px;">
            </div>

            <form id="lesson-form">
                <input type="time" id="lesson-time" required>
                <input type="text" id="lesson-subject" placeholder="Предмет" required>
                <input type="text" id="lesson-room" placeholder="Аудитория">
                <button type="submit" class="btn">Добавить пару</button>
            </form>

            <div id="lesson-list" style="margin-top:20px;"></div>
        </section>


    </main>

    <nav class="bottom-nav">
        <button data-screen="home">🏠 Главная</button>
        <button data-screen="tasks">✓ Задачи</button>
        <button data-screen="notes">📝 Заметки</button>
        <button data-screen="grades">📊 Оценки</button>
        <button data-screen="schedule">📅 Расписание</button>
    </nav>

</body>

</html>
